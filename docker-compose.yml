version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: t20_postgres
    restart: always
    environment:
      POSTGRES_USER: t20_admin
      POSTGRES_PASSWORD: securepass123
      POSTGRES_DB: t20_analytics
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
